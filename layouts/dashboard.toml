# Généré par ER Overlay Layout Editor
# Square grid units: 1 unit = 1 icon square.

[grid]
columns = 9
unit_size = 64
gap = 4
border_radius = 6
window_padding = 8

[style]
border_default = [100, 100, 110, 200]
border_complete = [60, 200, 90, 255]
tile_bg = [12, 12, 18, 180]
window_bg = [12, 12, 18, 166]
window_border = true
label_scale = 0.65
value_scale = 1.15

default_section = "minimalist"

[[section]]
name = "minimalist"
editor_cols = 9
editor_rows = 1

[[section.tile]]
kind = "label"
label = "DEFAULT"
col = 0
row = 0
w = 2

[[section.tile]]
kind = "metric"
metric = "igt"
label = "IGT"
col = 2
row = 0
w = 2

[[section.tile]]
kind = "metric"
metric = "deaths"
label = "DEATHS"
col = 4
row = 0

