# Square grid units: 1 unit = 1 icon square (48×48 px by default).
# Position: col, row (top-left corner).
# Size: w, h (number of units — e.g. w=3 h=1 = 3×1 rectangle).
#
# Sections: only one visible at a time. Cycle via layout_section_hotkey in er_overlay.toml.

[grid]
columns = 8
unit_size = 64
gap = 4
border_radius = 6
window_padding = 8

[style]
border_default = [100, 100, 110, 200]
border_complete = [60, 200, 90, 255]
tile_bg = [12, 12, 18, 180]
label_scale = 0.65
value_scale = 1.15

default_section = "minimalist"

# ── Minimal: essential counters ────────────────────────────────────

[[section]]
name = "minimalist"

[[section.tile]]
kind = "label"
col = 0
row = 0
w = 2
h = 1
label = "DEFAULT"

[[section.tile]]
kind = "metric"
metric = "igt"
col = 2
row = 0
w = 2
h = 1
label = "IGT"

[[section.tile]]
kind = "metric"
metric = "deaths"
col = 4
row = 0
w = 1
h = 1
label = "DEATHS"

[[section.tile]]
kind = "metric"
metric = "ng_cycle"
col = 5
row = 0
w = 1
h = 1
label = "NG"

[[section.tile]]
kind = "metric"
metric = "bosses"
col = 6
row = 0
w = 1
h = 1
label = "BOSS"
show_max = true

