# Généré par ER Overlay Layout Editor
# Square grid units: 1 unit = 1 icon square.

[grid]
columns = 10
unit_size = 64
gap = 4
border_radius = 6
window_padding = 8

[style]
border_default = [100, 100, 110, 200]
border_complete = [255, 0, 0, 179]
tile_bg = [12, 12, 18, 180]
window_bg = [12, 12, 18, 0]
window_border = false
label_scale = 0.65
value_scale = 1.15

default_section = "minimalist"

[[section]]
name = "minimalist"

[[section.tile]]
kind = "label"
label = "French Challenge"
col = 0
row = 0
w = 2

[[section.tile]]
kind = "metric"
metric = "igt"
label = "IGT"
col = 6
row = 0
w = 2

[[section.tile]]
kind = "metric"
metric = "deaths"
label = "DEATHS"
col = 5
row = 0

[[section.tile]]
kind = "metric"
metric = "bosses"
label = "BOSS"
show_max = true
col = 3
row = 0
w = 2

[[section.tile]]
kind = "metric"
metric = "pb"
label = "PB"
# PB metric + direction (see [challenge] in er_overlay.toml).
# max = keep the highest value under budget; min = keep the lowest at run end.
pb_metric = "bosses"
pb_mode = "max"
col = 2
row = 0

