<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ER Overlay — Layout Editor</title>
  <link rel="stylesheet" href="layout_editor_assets/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-icon">◈</span>
      <h1 data-i18n="brandTitle">Layout Editor</h1>
      <span class="brand-sub">Elden Ring Overlay</span>
    </div>
    <div class="topbar-actions">
      <div class="lang-switch" role="group" data-i18n-aria="langSwitch" aria-label="Language">
        <button type="button" class="lang-btn active" data-lang="en">EN</button>
        <button type="button" class="lang-btn" data-lang="fr">FR</button>
      </div>
      <label class="btn btn-ghost" for="import-file">
        <span data-i18n="importLayout">Import layout file</span>
        <input id="import-file" type="file" accept=".toml" hidden />
      </label>
      <button id="btn-new" class="btn btn-ghost" type="button" data-i18n="new">New</button>
      <button id="btn-export" class="btn btn-primary" type="button" data-i18n="exportLayout">Export layout file</button>
    </div>
  </header>

  <div class="workspace">
    <aside class="panel panel-left">
      <section class="panel-block">
        <h2 data-i18n="palette">Palette</h2>
        <p class="hint" data-i18n="paletteHint">Drag an item onto the grid.</p>
        <div id="palette-metrics" class="palette"></div>
        <h3 class="subhead" data-i18n="text">Text</h3>
        <div id="palette-label" class="palette"></div>
        <h3 class="subhead"><span data-i18n="items">Items</span> <span id="catalog-count" class="badge"></span></h3>
        <div id="palette-item-sections" class="item-sections"></div>
      </section>
    </aside>

    <main class="canvas-area">
      <div class="canvas-toolbar">
        <div class="section-tabs" id="section-tabs"></div>
        <div class="canvas-toolbar-spacer"></div>
        <span id="grid-info" class="muted"></span>
      </div>
      <div class="canvas-wrapper">
        <div id="grid-canvas" class="grid-canvas"></div>
      </div>
    </main>

    <aside class="panel panel-right">
      <section class="panel-block" id="props-empty">
        <h2 data-i18n="properties">Properties</h2>
        <p class="hint" data-i18n="propertiesHint">Select a tile or configure the grid.</p>
      </section>

      <section class="panel-block hidden" id="props-tile">
        <h2 data-i18n="tile">Tile</h2>
        <div class="field">
          <label data-i18n="type">Type</label>
          <input id="prop-kind" class="input" type="text" readonly />
        </div>
        <div class="field" id="field-label">
          <label data-i18n="label">Label</label>
          <input id="prop-label" class="input" type="text" />
        </div>
        <div class="field hidden" id="field-metric">
          <label data-i18n="metric">Metric</label>
          <select id="prop-metric" class="input"></select>
        </div>
        <div class="field hidden" id="field-key">
          <label data-i18n="key">Key</label>
          <input id="prop-key" class="input" type="text" />
        </div>
        <div class="field-row">
          <div class="field">
            <label data-i18n="col">Col</label>
            <input id="prop-col" class="input input-num" type="number" min="0" />
          </div>
          <div class="field">
            <label data-i18n="row">Row</label>
            <input id="prop-row" class="input input-num" type="number" min="0" />
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>w</label>
            <input id="prop-w" class="input input-num" type="number" min="1" />
          </div>
          <div class="field">
            <label>h</label>
            <input id="prop-h" class="input input-num" type="number" min="1" />
          </div>
        </div>
        <div class="field hidden" id="field-show-max">
          <label class="checkbox-label">
            <input id="prop-show-max" type="checkbox" />
            <span data-i18n="showMax">show_max</span>
          </label>
        </div>
        <div class="field hidden" id="field-icon">
          <label data-i18n="iconOptional">Icon (optional)</label>
          <input id="prop-icon" class="input" type="text" data-i18n-placeholder="iconPlaceholder" placeholder="kindling, scadutree…" />
        </div>
        <button id="btn-delete-tile" class="btn btn-danger btn-block" type="button" data-i18n="delete">Delete</button>
      </section>

      <section class="panel-block">
        <h2 data-i18n="grid">Grid</h2>
        <div class="field-row">
          <div class="field">
            <label data-i18n="columns">Columns</label>
            <input id="cfg-columns" class="input input-num" type="number" min="1" max="32" />
          </div>
          <div class="field">
            <label data-i18n="rows">Rows</label>
            <input id="cfg-rows" class="input input-num" type="number" min="1" max="32" />
          </div>
        </div>
        <p class="hint" data-i18n="gridResizeHint">Drag grid edges to resize.</p>
        <div class="field-row">
          <div class="field">
            <label data-i18n="unitPx">Unit (px)</label>
            <input id="cfg-unit-size" class="input input-num" type="number" min="16" />
          </div>
          <div class="field">
            <label data-i18n="gap">Gap</label>
            <input id="cfg-gap" class="input input-num" type="number" min="0" />
          </div>
        </div>
        <div class="field">
          <label data-i18n="padding">Padding</label>
          <input id="cfg-padding" class="input input-num" type="number" min="0" />
        </div>
        <div class="field">
          <label data-i18n="defaultSection">Default section</label>
          <select id="cfg-default-section" class="input">
            <option value="minimalist">minimalist</option>
            <option value="extended">extended</option>
          </select>
        </div>
        <h3 class="subhead" data-i18n="overlayPreview">Overlay preview</h3>
        <p class="hint" data-i18n="overlayPreviewHint">Values from er_overlay.toml — affects text size on the canvas only.</p>
        <div class="field-row">
          <div class="field">
            <label data-i18n="textSize">text_size</label>
            <input id="cfg-text-size" class="input input-num" type="number" min="12" max="48" step="1" />
          </div>
          <div class="field">
            <label data-i18n="overlayScale">scale</label>
            <input id="cfg-overlay-scale" class="input input-num" type="number" min="0.25" max="4" step="0.05" />
          </div>
        </div>
      </section>
    </aside>
  </div>

  <script src="layout_editor_assets/catalog.js"></script>
  <script src="layout_editor_assets/i18n.js"></script>
  <script src="layout_editor_assets/app.js"></script>
</body>
</html>
