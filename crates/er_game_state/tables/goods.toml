# Goods — one row per tracked item (EquipParamGoods or EquipParamAccessory for talismans).
# By default a good is owned / not-owned (0 or 1, like runes and talismans).
# key         : unique id + default PNG ({key}.png)
# pickup_flag : optional event flag used to detect ownership (otherwise inventory presence).
# count       : true for stackable goods (0+) → show the inventory quantity instead.
# max         : optional display cap for a counter (e.g. scadutree → "N/50").
# icon_id     : only for tools/goods/fetch_goods_icons.py
texture_prefix = "MENU_Knowledge"

# Aggregate groups expose an "owned / total" metric named after the group, counting how
# many member goods are owned. Members can be any goods — no Rust changes required.
[groups.great_runes]
members = ["godrick_rune", "radahn_rune", "morgott_rune", "rykard_rune", "mohg_rune", "malenia_rune", "unborn_rune"]

