name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Publish companion
        run: dotnet publish companion/er_checks_extractor/er_checks_extractor.csproj -c Release -o target/release/companion

      - name: Bundle artifacts
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}"
          $out = "er-overlay-$ver"
          New-Item -ItemType Directory -Force $out | Out-Null

          Copy-Item target/release/er_overlay_injector.exe $out/
          Copy-Item target/release/er_overlay.dll          $out/
          Copy-Item target/release/er_overlay.toml          $out/
          Copy-Item target/release/layouts $out/ -Recurse
          Copy-Item target/release/tables  $out/ -Recurse
          Copy-Item target/release/assets  $out/ -Recurse
          Copy-Item target/release/companion $out/ -Recurse
          # User-facing README (usage only) — the full README.md stays in the repo.
          Copy-Item docs/release/README.md    $out/README.md
          Copy-Item docs/release/README.fr.md $out/README.fr.md
          Copy-Item LICENSE                   $out/

          # Layout editor — HTML at zip root, assets in layout_editor_assets/
          Copy-Item tools/layout_editor/layout_editor.html $out/
          Copy-Item tools/layout_editor/layout_editor_assets $out/layout_editor_assets -Recurse

          Compress-Archive -Path "$out/*" -DestinationPath "$out.zip" -Force

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: er-overlay-${{ github.ref_name }}.zip
          generate_release_notes: true
