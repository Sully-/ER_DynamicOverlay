# ── General ──────────────────────────────────────────────────────────
# Show the ImGui debug window (diagnostics, boss table path, etc.).
show_debug = false
# Show the HUD when the overlay starts. Toggle at runtime with hide_all_hotkey.
overlay_visible = true

# ── HUD placement ────────────────────────────────────────────────────
# Anchor corner: top-left | top-right | bottom-left | bottom-right
anchor = "top-right"
offset_x = 16.0
offset_y = 16.0
scale = 1.0
text_size = 18.0
icon_size = 24.0

# ── Appearance ───────────────────────────────────────────────────────
# Desaturation for unowned / incomplete tracked items (0–1).
gray_tint = 0.40
use_item_icons = true
# icons_dir = "assets/icons"   # relative to the er_overlay.dll directory

# ── Layout ───────────────────────────────────────────────────────────
layout_file = "layouts/dashboard.toml"
# Initial layout section; overrides default_section in the layout file.
default_layout_section = "minimalist"

# ── Hotkeys ──────────────────────────────────────────────────────────
# Cycle layout sections (minimalist ↔ extended, etc.).
layout_section_hotkey = "F8"
# Toggle the boss checklist panel (opens minimalist layout when shown).
boss_panel_hotkey = "F7"
# Toggle the checks panel (boss + loot checklist; left edge by default).
checks_panel_hotkey = "F6"
# Show / hide the entire overlay (HUD + boss panel).
hide_all_hotkey = "F9"

# ── Boss panel ───────────────────────────────────────────────────────
# Scope: current-region | all-regions
boss_panel_scope = "all-regions"
# Only one of boss / checks panels (or the extended layout) shows at a time.
# Both false = start with just the HUD; open a panel in-game with F7 (boss) / F6 (checks).
boss_panel_visible = false
# Boss table: tables/<lang>/bosses.toml next to the DLL (hot-reloaded ~every 2 s).
# auto = game language (Steam), or en, fr, …
boss_locale = "auto"
# Optional placement: x, y, width, height (pixels or %). Omit or "auto" for default.
# Examples:
#   Pixels:  32, 120, 480, 900
#   Percent: 75%, 8%, 22%, 45%
#   Default: -5, 10, 25%, 92%  (right edge; Y shifts below minimalist HUD if needed)
# boss_panel_layout = "-5, 10, 25%, 92%"

# ── Checks panel (bosses + loot, randomizer-aware) ───────────────────
# A "check" = a boss to kill OR an item to loot. Toggle with checks_panel_hotkey (F6).
# Scope: current-region | all-regions
checks_panel_scope = "all-regions"
checks_panel_visible = false
# Placement (same syntax as boss_panel_layout). Default: left edge, full height.
# checks_panel_layout = "5, 10, 25%, 92%"
#
# Randomizer support (item randomizer by thefifthmatt): for ground-loot checks the
# acquisition flag changes every seed. Point this at the regulation.bin the game LOADS
# (your ModEngine mod) and the overlay resolves the current flags automatically — no
# manual step. Leave empty/omitted for vanilla (dynamic checks use their vanilla flags).
# regulation_path = "C:/.../ModEngine2/mod/regulation.bin"
# Path to the shipped extractor. Omit to auto-find companion/er_checks_extractor.exe
# (then er_checks_extractor.exe) next to the DLL.
# checks_extractor_path = "companion/er_checks_extractor.exe"

# ── Challenge mode (EROverlay-compatible) ────────────────────────────
# Metrics pb / nbtries in layouts/dashboard.toml.
[challenge]
enabled = false
max_deaths = 0
start_flag = 101
